name: Update Signal Data

on:
  schedule:
    # 平日 07:00 UTC = 16:00 JST (東証クローズ15:00の1時間後)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update_all
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python update_all.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signal_data/ paper_trades/ backtest_result.png || true
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-update signal data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
